version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: dashup-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
    volumes:
      - mongodb_data:/data/db
    networks:
      - dashup-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashup-server
    restart: unless-stopped
    ports:
      - "${PORT:-1818}:1818"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-1818}
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - CLOUD_NAME=${CLOUD_NAME}
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - CLOUD_API_SECRET=${CLOUD_API_SECRET}
    depends_on:
      - mongodb
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    networks:
      - dashup-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  dashup-network:
    driver: bridge

